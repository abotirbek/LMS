{% extends 'base.html' %}
{% block content %}
<h3>Attendance List</h3>
<ul>
  {% for item in attendance %}
    <li>
      <a href="{% url 'read_attendance' item.pk %}">{{ item }}</a>
      | <a href="{% url 'update_attendance' item.pk %}">Edit</a>
      | <a href="{% url 'delete_attendance' item.pk %}">Delete</a>
    </li>
  {% empty %}
    <li>No attendance records yet.</li>
  {% endfor %}
</ul>
<a href="{% url 'create_attendance' %}">Create Attendance</a>
{% endblock %}
